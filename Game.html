<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Galaxy Survival: Space Shooter</title>
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
    }

    #GW {
      position: relative;
      width: 420px;
      height: 740px;
      overflow: hidden;
    }

    #BG,
    #GC {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #GC {
      z-index: 1;
      touch-action: none;
    }

    #HUD {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      pointer-events: none;
    }

    #HUD_TOP {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px 4px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, .85), transparent);
    }

    .HBOX {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .HLB {
      font-size: 7px;
      color: rgba(255, 200, 50, .6);
      letter-spacing: 2px;
      font-family: 'Rajdhani', sans-serif;
    }

    .HLV {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    #HSC {
      color: #fff;
      text-shadow: 0 0 10px #ffcc00, 0 0 20px rgba(255, 200, 0, .4);
    }

    #HCN {
      color: #ffee00;
      font-size: 14px;
      text-shadow: 0 0 8px #ffcc00;
    }

    #HLIVES {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .liveicon {
      width: 16px;
      height: 16px;
      display: inline-block;
    }

    #HXPBAR {
      margin: 0 12px 4px;
      height: 4px;
      background: rgba(255, 255, 255, .08);
      border-radius: 2px;
      overflow: hidden;
    }

    #HXPFILL {
      height: 100%;
      background: linear-gradient(90deg, #ff8800, #ffcc00);
      border-radius: 2px;
      transition: width .3s;
    }

    #HHPBAR_WRAP {
      margin: 0 12px 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #HHPLABEL {
      font-size: 7px;
      color: rgba(0, 255, 120, .5);
      letter-spacing: 2px;
      white-space: nowrap;
    }

    #HHPBAR {
      flex: 1;
      height: 7px;
      background: rgba(255, 255, 255, .06);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(0, 255, 120, .15);
    }

    #HHPFILL {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #00ff88, #00ffcc);
      box-shadow: 0 0 6px #00ff88;
      transition: width .15s, background .3s;
    }

    #HWEPBADGE {
      position: absolute;
      bottom: 145px;
      right: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      pointer-events: none;
    }

    .wbadge {
      font-size: 8px;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 1px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
    }

    #PUD {
      position: absolute;
      top: 62px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      display: flex;
      gap: 5px;
      pointer-events: none;
    }

    .pp {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 7px;
      letter-spacing: 1px;
      font-weight: 700;
      animation: ppA 1s ease-in-out infinite;
    }

    .pp.shield {
      background: rgba(0, 100, 255, .35);
      border: 1px solid #0088ff;
      color: #99ddff;
    }

    .pp.rapid {
      background: rgba(255, 180, 0, .25);
      border: 1px solid #ffcc00;
      color: #ffee99;
    }

    .pp.double {
      background: rgba(255, 0, 80, .25);
      border: 1px solid #ff0055;
      color: #ffaacc;
    }

    .pp.magnet {
      background: rgba(160, 0, 255, .25);
      border: 1px solid #aa00ff;
      color: #ddaaff;
    }

    @keyframes ppA {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    #WAVEBANNER {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 22;
      text-align: center;
      pointer-events: none;
      transition: transform .35s cubic-bezier(.34, 1.56, .64, 1);
    }

    #WAVEBANNER.show {
      transform: translate(-50%, -50%) scale(1);
    }

    #WBTEXT {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 3px;
      -webkit-text-stroke: 1px #ff8800;
      color: #ffcc00;
      text-shadow: 0 0 20px #ff8800, 0 0 40px rgba(255, 140, 0, .5);
    }

    #WBSUB {
      font-size: 10px;
      color: rgba(255, 200, 100, .6);
      letter-spacing: 5px;
      margin-top: 3px;
    }

    #BOSSWARN {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 25;
      text-align: center;
      display: none;
      pointer-events: none;
    }

    #BOSSWARN.flash {
      display: block;
      animation: bfl .4s infinite;
    }

    #BWTEXT {
      font-size: 34px;
      font-weight: 900;
      color: #ff0080;
      text-shadow: 0 0 25px #ff0080;
      letter-spacing: 3px;
    }

    @keyframes bfl {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .06
      }
    }

    .FT {
      position: absolute;
      z-index: 35;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
      animation: ftA .9s ease-out forwards;
    }

    @keyframes ftA {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1.1)
      }

      100% {
        opacity: 0;
        transform: translateY(-50px) scale(.7)
      }
    }

    #PAUSEBTN {
      position: absolute;
      top: 9px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      background: rgba(0, 0, 0, .5);
      border: 1px solid rgba(255, 200, 0, .2);
      color: rgba(255, 200, 0, .45);
      font-family: 'Orbitron', monospace;
      font-size: 7px;
      letter-spacing: 2px;
      padding: 3px 10px;
      cursor: pointer;
      border-radius: 10px;
      transition: all .2s;
    }

    #PAUSEBTN:hover {
      border-color: rgba(255, 200, 0, .6);
      color: #ffcc00;
    }

    #SNDBTN {
      position: absolute;
      top: 9px;
      right: 12px;
      z-index: 15;
      background: rgba(0, 0, 0, .5);
      border: 1px solid rgba(255, 200, 0, .2);
      color: rgba(255, 200, 0, .45);
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      padding: 3px 7px;
      cursor: pointer;
      border-radius: 8px;
      transition: all .2s;
    }

    #SNDBTN:hover {
      color: #ffcc00;
    }

    /* ── D-PAD CONTROLS ── */
    #DPAD {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      user-select: none;
    }

    .DROW {
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .DBTN {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: rgba(255, 200, 0, .08);
      border: 1.5px solid rgba(255, 200, 0, .25);
      color: rgba(255, 200, 0, .7);
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .1s, border-color .1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
    }

    .DBTN:active,
    .DBTN.pressed {
      background: rgba(255, 200, 0, .22);
      border-color: rgba(255, 200, 0, .6);
      color: #ffcc00;
      box-shadow: 0 0 12px rgba(255, 180, 0, .35);
    }

    .DBTN.mid {
      background: rgba(255, 255, 255, .04);
      border-color: rgba(255, 255, 255, .08);
      width: 34px;
      height: 34px;
      font-size: 13px;
    }

    .SCR {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
    }

    .SCR.hidden {
      display: none;
    }

    #SCR_TITLE {
      background: radial-gradient(ellipse at 50% 30%, rgba(40, 10, 80, .98), rgba(2, 3, 12, .99));
      justify-content: center;
    }

    .TITLE_LOGO {
      font-size: 32px;
      font-weight: 900;
      text-align: center;
      line-height: 1.15;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 0 0 20px #ff8800, 0 0 50px rgba(255, 140, 0, .25);
      margin-bottom: 4px;
    }

    .TITLE_LOGO span {
      color: #ffcc00;
      -webkit-text-stroke: .5px #ff8800;
    }

    .TITLE_SUB {
      font-size: 9px;
      color: rgba(255, 200, 80, .4);
      letter-spacing: 6px;
      margin-bottom: 32px;
    }

    .TITLE_BTNS {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .BTN_GOLD {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      padding: 13px 44px;
      background: linear-gradient(135deg, #ff8800, #ffcc00, #ff8800);
      border: none;
      color: #000;
      cursor: pointer;
      border-radius: 25px;
      text-transform: uppercase;
      box-shadow: 0 0 25px rgba(255, 140, 0, .5), 0 4px 15px rgba(0, 0, 0, .5);
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }

    .BTN_GOLD::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .3), transparent);
      transition: .4s;
    }

    .BTN_GOLD:hover::before {
      left: 100%;
    }

    .BTN_GOLD:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(255, 160, 0, .7);
    }

    .BTN_OUTLINE {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 10px 28px;
      background: transparent;
      border: 1.5px solid rgba(255, 200, 50, .35);
      color: rgba(255, 200, 50, .6);
      cursor: pointer;
      border-radius: 20px;
      transition: all .2s;
    }

    .BTN_OUTLINE:hover {
      border-color: rgba(255, 200, 50, .7);
      color: #ffcc00;
    }

    #SCR_SHOP {
      background: linear-gradient(180deg, rgba(5, 5, 20, .98), rgba(10, 5, 30, .99));
      padding: 12px;
      padding-top: 16px;
    }

    .SHOP_HEADER {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 10px;
    }

    .SHOP_TITLE {
      font-size: 16px;
      font-weight: 900;
      color: #ffcc00;
      letter-spacing: 3px;
      text-shadow: 0 0 12px #ff8800;
    }

    .SHOP_COINS_BADGE {
      background: linear-gradient(135deg, rgba(255, 160, 0, .15), rgba(255, 200, 0, .08));
      border: 1px solid rgba(255, 200, 0, .3);
      border-radius: 12px;
      padding: 4px 12px;
      font-size: 11px;
      color: #ffee00;
      letter-spacing: 1px;
    }

    .SHOP_TABS {
      display: flex;
      gap: 4px;
      width: 100%;
      margin-bottom: 10px;
    }

    .STAB {
      flex: 1;
      padding: 7px 4px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px;
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      color: rgba(255, 255, 255, .35);
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .2s;
      text-align: center;
    }

    .STAB.active {
      background: linear-gradient(135deg, rgba(255, 140, 0, .2), rgba(255, 200, 0, .1));
      border-color: rgba(255, 160, 0, .5);
      color: #ffcc00;
      text-shadow: 0 0 8px #ff8800;
    }

    .STAB_CONTENT {
      display: none;
      width: 100%;
    }

    .STAB_CONTENT.active {
      display: block;
    }

    .SHIP_GRID {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
    }

    .SHIP_CARD {
      background: linear-gradient(135deg, rgba(10, 15, 40, .95), rgba(5, 10, 25, .95));
      border: 1.5px solid rgba(255, 255, 255, .08);
      border-radius: 12px;
      padding: 10px 8px;
      cursor: pointer;
      transition: all .25s;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .SHIP_CARD::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 200, 0, .3), transparent);
    }

    .SHIP_CARD.owned {
      border-color: rgba(0, 220, 120, .25);
    }

    .SHIP_CARD.active_ship {
      border-color: #ffcc00;
      box-shadow: 0 0 14px rgba(255, 160, 0, .3);
    }

    .SHIP_CARD:hover:not(.locked_card) {
      border-color: rgba(255, 160, 0, .45);
      background: linear-gradient(135deg, rgba(20, 20, 60, .95), rgba(10, 15, 40, .95));
    }

    .SHIP_CARD.locked_card {
      opacity: .55;
      cursor: not-allowed;
    }

    .SHIP_IMG_WRAP {
      width: 80px;
      height: 90px;
      margin: 0 auto 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .SHIP_IMG_WRAP svg {
      filter: drop-shadow(0 0 8px var(--scol, #00ccff));
    }

    .SHIP_NAME {
      font-size: 9px;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 2px;
      font-weight: 700;
    }

    .SHIP_CLASS {
      font-size: 7px;
      color: rgba(255, 180, 50, .6);
      letter-spacing: 1px;
      margin-bottom: 5px;
      font-family: 'Rajdhani', sans-serif;
    }

    .SHIP_STATS {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 6px;
    }

    .SSTAT {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .SSTAT_LABEL {
      font-size: 6px;
      color: rgba(255, 255, 255, .3);
      width: 24px;
      letter-spacing: .5px;
      font-family: 'Rajdhani', sans-serif;
    }

    .SSTAT_BAR {
      flex: 1;
      height: 3px;
      background: rgba(255, 255, 255, .08);
      border-radius: 2px;
      overflow: hidden;
    }

    .SSTAT_FILL {
      height: 100%;
      border-radius: 2px;
    }

    .SHIP_BTN {
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      letter-spacing: 1px;
      padding: 5px 10px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      transition: all .2s;
      width: 100%;
    }

    .SHIP_BTN.buy {
      background: linear-gradient(135deg, #ff8800, #ffcc00);
      color: #000;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(255, 140, 0, .4);
    }

    .SHIP_BTN.buy:hover {
      transform: scale(1.05);
    }

    .SHIP_BTN.equip {
      background: linear-gradient(135deg, rgba(0, 200, 100, .2), rgba(0, 255, 140, .1));
      border: 1px solid rgba(0, 200, 100, .4);
      color: #00ff88;
    }

    .SHIP_BTN.equipped {
      background: linear-gradient(135deg, rgba(255, 160, 0, .15), rgba(255, 200, 0, .08));
      border: 1px solid rgba(255, 160, 0, .4);
      color: #ffcc00;
      cursor: default;
    }

    .SHIP_BTN.locked {
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .1);
      color: rgba(255, 255, 255, .3);
      cursor: not-allowed;
    }

    .OWNED_BADGE {
      position: absolute;
      top: 6px;
      right: 6px;
      background: linear-gradient(135deg, #00aa55, #00ff88);
      border-radius: 6px;
      font-size: 6px;
      color: #000;
      font-weight: 700;
      padding: 1px 5px;
      letter-spacing: .5px;
    }

    .ACTIVE_BADGE {
      position: absolute;
      top: 6px;
      left: 6px;
      background: linear-gradient(135deg, #ff8800, #ffcc00);
      border-radius: 6px;
      font-size: 6px;
      color: #000;
      font-weight: 700;
      padding: 1px 5px;
      letter-spacing: .5px;
    }

    .UPG_TITLE {
      font-size: 8px;
      color: rgba(255, 200, 50, .5);
      letter-spacing: 3px;
      margin-bottom: 7px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .UPG_TITLE::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(255, 160, 0, .2), transparent);
    }

    .UPG_GRID {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .UPG_CARD {
      background: linear-gradient(135deg, rgba(10, 15, 40, .95), rgba(5, 10, 25, .95));
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: 10px;
      padding: 9px;
      cursor: pointer;
      transition: all .2s;
    }

    .UPG_CARD:hover:not(.maxed_c):not(.cant_c) {
      border-color: rgba(0, 200, 255, .38);
      background: linear-gradient(135deg, rgba(0, 30, 70, .95), rgba(0, 20, 50, .95));
    }

    .UPG_CARD.maxed_c {
      border-color: rgba(0, 200, 100, .22);
      cursor: default;
    }

    .UPG_CARD.cant_c {
      opacity: .4;
      cursor: not-allowed;
    }

    .UPG_ICON {
      font-size: 18px;
      margin-bottom: 4px;
      display: block;
    }

    .UPG_NAME {
      font-size: 8px;
      color: #fff;
      letter-spacing: .5px;
      margin-bottom: 1px;
    }

    .UPG_DESC {
      font-size: 6px;
      color: rgba(255, 255, 255, .3);
      margin-bottom: 5px;
      font-family: 'Rajdhani', sans-serif;
    }

    .UPG_LVLDOTS {
      display: flex;
      gap: 2px;
      margin-bottom: 5px;
    }

    .UDOT {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .12);
    }

    .UDOT.on {
      background: #ffcc00;
      border-color: #ff8800;
      box-shadow: 0 0 3px #ff8800;
    }

    .UPG_COST {
      font-size: 8px;
      color: #ffee00;
      letter-spacing: .5px;
    }

    .UPG_COST.maxed_c {
      color: #00ff88;
    }

    .WEP_GRID {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .WEP_CARD {
      background: linear-gradient(135deg, rgba(10, 15, 40, .95), rgba(5, 10, 25, .95));
      border: 1px solid rgba(255, 0, 100, .08);
      border-radius: 10px;
      padding: 9px;
      cursor: pointer;
      transition: all .2s;
    }

    .WEP_CARD:hover:not(.cant_c) {
      border-color: rgba(255, 0, 100, .35);
    }

    .WEP_CARD.owned_w {
      border-color: rgba(0, 200, 100, .22);
    }

    .WEP_CARD.active_w {
      border-color: #ff0080;
      background: rgba(255, 0, 80, .07);
    }

    .WEP_CARD.cant_c {
      opacity: .4;
      cursor: not-allowed;
    }

    .WEP_NAME {
      font-size: 8px;
      color: #fff;
      letter-spacing: .5px;
      margin-bottom: 1px;
    }

    .WEP_DESC {
      font-size: 6px;
      color: rgba(255, 255, 255, .28);
      margin-bottom: 5px;
      font-family: 'Rajdhani', sans-serif;
    }

    .WEP_ICON_WRAP {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 5px;
    }

    .WEP_COST {
      font-size: 8px;
      letter-spacing: .5px;
    }

    #SHOP_BACK {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    #SCR_PAUSE {
      background: rgba(0, 0, 0, .85);
      justify-content: center;
    }

    #SCR_PAUSE h2 {
      font-size: 26px;
      color: #ffcc00;
      letter-spacing: 5px;
      margin-bottom: 24px;

</head>

<body>

  <script>
    'use strict';

    // ══════════════════════════════════════════
    // CRAZYGAMES SDK v3 — immediate async IIFE (required for portal detection)
    // ══════════════════════════════════════════
    let cgSDK = null;
    (async () => {
      try {
        if (typeof window.CrazyGames !== 'undefined' &&
            window.CrazyGames !== null &&
            typeof window.CrazyGames.SDK !== 'undefined') {
          cgSDK = window.CrazyGames.SDK;
          await cgSDK.init();
          console.log('CrazyGames SDK v3 ready');
        }
      } catch (e) { console.warn('CG SDK init:', e); }
    })();

    function cgStart() { try { if (cgSDK) cgSDK.game.gameplayStart(); } catch(e){} }
    function cgStop()  { try { if (cgSDK) cgSDK.game.gameplayStop();  } catch(e){} }
    function cgAdBreak() {
      try {
        if (!cgSDK) return;
        cgSDK.ad.requestAd('midgame', {
          adStarted:  () => stopMusic(),
          adFinished: () => { if (running && !paused) startMusic(); },
          adError:    () => {}
        });
      } catch(e) {}
    }
    // ═══════════════ AUDIO ═══════════════
    let AC = null, sndOn = true;
    const getAC = () => { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); return AC; };
    function snd(t) {
      if (!sndOn) return; try {
        const a = getAC(), g = a.createGain(), n = a.currentTime; g.connect(a.destination);
        if (t === 'laser') { const o = a.createOscillator(); o.connect(g); o.type = 'square'; o.frequency.setValueAtTime(880, n); o.frequency.exponentialRampToValueAtTime(200, n + .08); g.gain.setValueAtTime(.07, n); g.gain.exponentialRampToValueAtTime(.001, n + .09); o.start(n); o.stop(n + .09); }
        else if (t === 'plasma') { const o = a.createOscillator(); o.connect(g); o.type = 'sawtooth'; o.frequency.setValueAtTime(180, n); o.frequency.exponentialRampToValueAtTime(55, n + .2); g.gain.setValueAtTime(.11, n); g.gain.exponentialRampToValueAtTime(.001, n + .22); o.start(n); o.stop(n + .22); }
        else if (t === 'missile') { const o = a.createOscillator(); o.connect(g); o.type = 'sawtooth'; o.frequency.setValueAtTime(380, n); o.frequency.linearRampToValueAtTime(580, n + .05); o.frequency.exponentialRampToValueAtTime(90, n + .18); g.gain.setValueAtTime(.09, n); g.gain.exponentialRampToValueAtTime(.001, n + .2); o.start(n); o.stop(n + .2); }
        else if (t === 'xs') { const b = a.createBuffer(1, a.sampleRate * .18, a.sampleRate), d = b.getChannelData(0); for (let i = 0; i < d.length; i++)d[i] = (Math.random() * 2 - 1) * (1 - i / d.length); const s = a.createBufferSource(); s.buffer = b; const f = a.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 600; s.connect(f); f.connect(g); g.gain.setValueAtTime(.22, n); g.gain.exponentialRampToValueAtTime(.001, n + .18); s.start(n); s.stop(n + .18); }
        else if (t === 'xb') { const b = a.createBuffer(1, a.sampleRate * .6, a.sampleRate), d = b.getChannelData(0); for (let i = 0; i < d.length; i++)d[i] = (Math.random() * 2 - 1) * (1 - i / d.length) * .9; const s = a.createBufferSource(); s.buffer = b; const f = a.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 280; s.connect(f); f.connect(g); g.gain.setValueAtTime(.45, n); g.gain.exponentialRampToValueAtTime(.001, n + .6); s.start(n); s.stop(n + .6); }
        else if (t === 'hit') { const o = a.createOscillator(); o.connect(g); o.type = 'sine'; o.frequency.setValueAtTime(140, n); o.frequency.exponentialRampToValueAtTime(55, n + .1); g.gain.setValueAtTime(.18, n); g.gain.exponentialRampToValueAtTime(.001, n + .12); o.start(n); o.stop(n + .12); }
        else if (t === 'coin') { const o = a.createOscillator(); o.connect(g); o.type = 'sine'; o.frequency.setValueAtTime(1200, n); o.frequency.exponentialRampToValueAtTime(1600, n + .05); g.gain.setValueAtTime(.055, n); g.gain.exponentialRampToValueAtTime(.001, n + .07); o.start(n); o.stop(n + .07); }
        else if (t === 'pu') { [440, 550, 660, 880].forEach((fr, i) => { const o = a.createOscillator(), gg = a.createGain(); o.connect(gg); gg.connect(a.destination); o.type = 'sine'; o.frequency.value = fr; const tt = n + i * .06; gg.gain.setValueAtTime(0, tt); gg.gain.linearRampToValueAtTime(.12, tt + .03); gg.gain.exponentialRampToValueAtTime(.001, tt + .1); o.start(tt); o.stop(tt + .12); }); }
        else if (t === 'bw') { [200, 250, 200, 250, 320].forEach((fr, i) => { const o = a.createOscillator(), gg = a.createGain(); o.connect(gg); gg.connect(a.destination); o.type = 'square'; o.frequency.value = fr; const tt = n + i * .18; gg.gain.setValueAtTime(.15, tt); gg.gain.exponentialRampToValueAtTime(.001, tt + .14); o.start(tt); o.stop(tt + .15); }); }
        else if (t === 'wave') { [330, 440, 550, 660].forEach((fr, i) => { const o = a.createOscillator(), gg = a.createGain(); o.connect(gg); gg.connect(a.destination); o.type = 'triangle'; o.frequency.value = fr; const tt = n + i * .07; gg.gain.setValueAtTime(.09, tt); gg.gain.exponentialRampToValueAtTime(.001, tt + .14); o.start(tt); o.stop(tt + .15); }); }
      } catch (e) { }
    }
    let MN = null;
    function startMusic() { if (!sndOn) return; try { stopMusic(); const a = getAC(); MN = []; const bass = a.createOscillator(), bg = a.createGain(); bass.connect(bg); bg.connect(a.destination); bass.type = 'sawtooth'; bass.frequency.value = 55; bg.gain.value = .03; const arp = a.createOscillator(), ag = a.createGain(), af = a.createBiquadFilter(); arp.connect(af); af.connect(ag); ag.connect(a.destination); arp.type = 'square'; af.type = 'lowpass'; af.frequency.value = 1100; ag.gain.value = .016; const notes = [220, 277, 330, 370, 440, 370, 330, 277]; let ni = 0; const tick = () => { if (!sndOn) return; arp.frequency.setValueAtTime(notes[ni % notes.length], a.currentTime); ni++; }; tick(); MN._int = setInterval(tick, 165); bass.start(); arp.start(); MN = [bass, bg, arp, ag, af]; } catch (e) { } }
    function stopMusic() { if (MN) { clearInterval(MN._int); MN.forEach(n => { try { if (n.stop) n.stop(); n.disconnect(); } catch (e) { } }); MN = null; } }

    // ═══════════════ CANVAS ═══════════════
    const GW = document.getElementById('GW');
    const bgC = document.getElementById('BG'), bgX = bgC.getContext('2d');
    const cv = document.getElementById('GC'), cx = cv.getContext('2d');
    let W, H;
    function resize() { W = GW.offsetWidth; H = GW.offsetHeight; bgC.width = cv.width = W; bgC.height = cv.height = H; }
    resize();

    // ═══════════════ SHIP SVG IMAGES FOR SHOP ═══════════════
    // Each ship has a rich SVG art for the shop card display
    const SHIP_SVGS = {
      viper: `<svg viewBox="0 0 80 90" xmlns="http://www.w3.org/2000/svg" width="80" height="90">
    <defs>
      <radialGradient id="vg1" cx="50%" cy="40%"><stop offset="0%" stop-color="#00eeff"/><stop offset="100%" stop-color="#003366"/></radialGradient>
      <radialGradient id="vg2" cx="50%" cy="50%"><stop offset="0%" stop-color="#aaffff" stop-opacity=".7"/><stop offset="100%" stop-color="#00ccff" stop-opacity="0"/></radialGradient>
      <filter id="vglow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- Engine flames -->
    <ellipse cx="35" cy="79" rx="5" ry="10" fill="url(#vg2)" opacity=".9"/>
    <ellipse cx="45" cy="79" rx="5" ry="10" fill="url(#vg2)" opacity=".9"/>
    <ellipse cx="26" cy="74" rx="3" ry="7" fill="#0099ff" opacity=".6"/>
    <ellipse cx="54" cy="74" rx="3" ry="7" fill="#0099ff" opacity=".6"/>
    <!-- Wings -->
    <polygon points="40,18 14,52 18,64 30,58 38,42" fill="#002244" stroke="#00ccff" stroke-width="1.2"/>
    <polygon points="40,18 66,52 62,64 50,58 42,42" fill="#002244" stroke="#00ccff" stroke-width="1.2"/>
    <!-- Wing accent lines -->
    <line x1="20" y1="48" x2="30" y2="56" stroke="#00eeff" stroke-width=".8" opacity=".6"/>
    <line x1="60" y1="48" x2="50" y2="56" stroke="#00eeff" stroke-width=".8" opacity=".6"/>
    <!-- Body -->
    <polygon points="40,4 52,38 50,68 30,68 28,38" fill="#001833" stroke="#00ccff" stroke-width="1.4" filter="url(#vglow)"/>
    <!-- Body detail lines -->
    <line x1="40" y1="16" x2="47" y2="38" stroke="#00ccff" stroke-width=".7" opacity=".3"/>
    <line x1="40" y1="16" x2="33" y2="38" stroke="#00ccff" stroke-width=".7" opacity=".3"/>
    <!-- Cockpit -->
    <ellipse cx="40" cy="28" rx="6" ry="10" fill="#002855" stroke="#00eeff" stroke-width="1"/>
    <ellipse cx="38" cy="24" rx="2.5" ry="4" fill="rgba(180,255,255,.35)"/>
    <!-- Nose -->
    <circle cx="40" cy="4" r="3" fill="#00eeff" filter="url(#vglow)"/>
    <!-- Engine ports -->
    <circle cx="33" cy="67" r="3" fill="#00aaff" opacity=".9"/>
    <circle cx="40" cy="68" r="3" fill="#00aaff" opacity=".9"/>
    <circle cx="47" cy="67" r="3" fill="#00aaff" opacity=".9"/>
    <!-- Wing gun nubs -->
    <rect x="11" y="55" width="5" height="9" rx="2" fill="#ff4400"/>
    <rect x="64" y="55" width="5" height="9" rx="2" fill="#ff4400"/>
  </svg>`,

      falcon: `<svg viewBox="0 0 80 90" xmlns="http://www.w3.org/2000/svg" width="80" height="90">
    <defs>
      <radialGradient id="fg1" cx="50%" cy="40%"><stop offset="0%" stop-color="#00ff99"/><stop offset="100%" stop-color="#003322"/></radialGradient>
      <radialGradient id="fg2" cx="50%" cy="30%"><stop offset="0%" stop-color="#aaffcc" stop-opacity=".8"/><stop offset="100%" stop-color="#00ff88" stop-opacity="0"/></radialGradient>
      <filter id="fglow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- Dual engine flames -->
    <ellipse cx="33" cy="78" rx="5" ry="12" fill="url(#fg2)" opacity=".95"/>
    <ellipse cx="47" cy="78" rx="5" ry="12" fill="url(#fg2)" opacity=".95"/>
    <!-- Canard fins (front small wings) -->
    <polygon points="40,12 26,22 28,28 38,22" fill="#002211" stroke="#00ff88" stroke-width="1"/>
    <polygon points="40,12 54,22 52,28 42,22" fill="#002211" stroke="#00ff88" stroke-width="1"/>
    <!-- Main swept wings -->
    <polygon points="38,20 8,48 12,62 28,56 36,38" fill="#001a0d" stroke="#00ff88" stroke-width="1.2"/>
    <polygon points="42,20 72,48 68,62 52,56 44,38" fill="#001a0d" stroke="#00ff88" stroke-width="1.2"/>
    <!-- Wing stripes -->
    <line x1="14" y1="44" x2="24" y2="54" stroke="#ffcc00" stroke-width="1" opacity=".5"/>
    <line x1="66" y1="44" x2="56" y2="54" stroke="#ffcc00" stroke-width="1" opacity=".5"/>
    <!-- Body slim -->

    // ═══════════════ STARS / BG ═══════════════
    const stars = [], nebs = [];

      for (let i = 0; i < 220; i++)stars.push({ x: Math.random() * W, y: Math.random() * H, sz: Math.random() * 2 + .2, spd: Math.random() * .65 + .08, op: Math.random() * .75 + .2, tw: Math.random() * Math.PI * 2, col: Math.random() > .85 ? 1 : 0 });
      for (let i = 0; i < 4; i++)nebs.push({ x: Math.random() * W, y: Math.random() * H, r: 70 + Math.random() * 110, h: 200 + Math.random() * 100 });
    }
    function drawBG(dt) {
      bgX.fillStyle = '#03040f'; bgX.fillRect(0, 0, W, H);
      nebs.forEach(n => { const g = bgX.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r); g.addColorStop(0, `hsla(${n.h},80%,30%,.04)`); g.addColorStop(1, 'transparent'); bgX.beginPath(); bgX.arc(n.x, n.y, n.r, 0, Math.PI * 2); bgX.fillStyle = g; bgX.fill(); });

    }

    // ═══════════════ INPUT ═══════════════
    const K = {};

    const DP = { up: false, down: false, left: false, right: false };
    function dpadPress(dir, pressed) {
      DP[dir] = pressed;

    document.addEventListener('keydown', e => { K[e.code] = true; if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault(); if ((e.code === 'Escape' || e.code === 'KeyP') && running) { paused ? unPause() : doPause(); } });
    document.addEventListener('keyup', e => { K[e.code] = false; });
    let tid = null, ltx = 0, lty = 0, md = false, lmx = 0, lmy = 0;
    cv.addEventListener('touchstart', e => { e.preventDefault(); const t = e.changedTouches[0]; tid = t.identifier; ltx = t.clientX; lty = t.clientY; }, { passive: false });
    cv.addEventListener('touchmove', e => { e.preventDefault(); for (const t of e.changedTouches) if (t.identifier === tid && player) { const r = cv.getBoundingClientRect(), sx = W / r.width, sy = H / r.height; player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x + (t.clientX - ltx) * sx)); player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, player.y + (t.clientY - lty) * sy)); ltx = t.clientX; lty = t.clientY; } }, { passive: false });
    cv.addEventListener('touchend', e => { for (const t of e.changedTouches) if (t.identifier === tid) tid = null; });
    cv.addEventListener('mousedown', e => { md = true; const r = cv.getBoundingClientRect(); lmx = (e.clientX - r.left) * (W / r.width); lmy = (e.clientY - r.top) * (H / r.height); });
    cv.addEventListener('mousemove', e => { if (!md || !player) return; const r = cv.getBoundingClientRect(), mx = (e.clientX - r.left) * (W / r.width), my = (e.clientY - r.top) * (H / r.height); player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x + (mx - lmx))); player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, player.y + (my - lmy))); lmx = mx; lmy = my; });
    cv.addEventListener('mouseup', () => md = false); cv.addEventListener('mouseleave', () => md = false);

    function movePlayer(dt) {
      if (!player) return; const s = player.spd;
      const goL = K['ArrowLeft'] || K['KeyA'] || DP.left;
      const goR = K['ArrowRight'] || K['KeyD'] || DP.right;
      const goU = K['ArrowUp'] || K['KeyW'] || DP.up;
      const goD = K['ArrowDown'] || K['KeyS'] || DP.down;
      if (goL) player.x = Math.max(player.w / 2, player.x - s * dt);
      if (goR) player.x = Math.min(W - player.w / 2, player.x + s * dt);
      if (goU) player.y = Math.max(player.h / 2, player.y - s * dt);
      if (goD) player.y = Math.min(H - player.h / 2, player.y + s * dt);
    }

    // ═══════════════ PLAYER ═══════════════
    function mkPlayer() {
      const ship = SHIPS[GS.activeShip], upg = GS.shipUpgrades[GS.activeShip];
      const mhp = Math.floor(ship.baseHP * (1 + upg.hp * .22));
      return { x: W / 2, y: H - 160, w: 40, h: 52, hp: mhp, mhp, spd: ship.baseSPD * (1 + upg.spd * .12), fr: Math.max(.06, ship.baseFR * (1 - upg.fr * .06)), dmg: Math.floor(ship.baseDMG * (1 + upg.dmg * .18)), fc: 0, inv: 0, trail: [], tt: 0, shipId: GS.activeShip };
    }
    function hexToRgb(hex) { const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return `${r},${g},${b}`; }

    function drawPlayer(dt) {
      if (!player) return;

      if (p.inv > 0 && Math.floor(p.inv * 10) % 2 === 0) return;

      p.trail.forEach((t, i) => {

        const col = SHIPS[p.shipId].color;

        cx.beginPath(); cx.arc(t.x, t.y, r, 0, Math.PI * 2); cx.fillStyle = g; cx.fill();
      });
      drawShipOnCtx(cx, p.shipId, p.x, p.y, 1.1, p.tt);

      const pct = Math.max(0, player.hp / player.mhp * 100);
      const bar = document.getElementById('HHPFILL'); bar.style.width = pct + '%';
      if (pct < 25) { bar.style.background = 'linear-gradient(90deg,#ff2244,#ff6644)'; bar.style.boxShadow = '0 0 8px #ff2244'; }
      else if (pct < 55) { bar.style.background = 'linear-gradient(90deg,#ffaa00,#ffdd44)'; bar.style.boxShadow = '0 0 6px #ffaa00'; }
      else { bar.style.background = 'linear-gradient(90deg,#00ff88,#00ffcc)'; bar.style.boxShadow = '0 0 6px #00ff88'; }
      const xpPct = (score % 1000) / 1000 * 100; document.getElementById('HXPFILL').style.width = xpPct + '%';
    }


    // ══════════════════════════════════════════
    // COMBO SYSTEM
    // ══════════════════════════════════════════
    let comboCount = 0, comboTimer = 0;
    const COMBO_DECAY = 3.5;
    function addCombo() {
      comboCount++; comboTimer = COMBO_DECAY;
      const el = document.getElementById('COMBO_HUD');
      const num = document.getElementById('COMBO_NUM');
      if (comboCount >= 2) { el.classList.add('show'); num.textContent = `×${comboCount}`; }
    }
    function updateCombo(dt) {
      if (comboCount < 2) return;
      comboTimer -= dt;
      if (comboTimer <= 0) { comboCount = 0; document.getElementById('COMBO_HUD').classList.remove('show'); }
    }
    function comboMult() { return comboCount >= 10 ? 3 : comboCount >= 5 ? 2 : comboCount >= 2 ? 1.5 : 1; }

    // Screen shake
    let shakeAmt = 0;
    function shake(amt) { shakeAmt = Math.max(shakeAmt, amt); }
    function applyShake() {
      try {
        const cv2 = document.getElementById('GC');
        if (!cv2) return;
        if (shakeAmt < .2) { shakeAmt = 0; cv2.style.transform = ''; return; }
        const dx = (Math.random() - .5) * shakeAmt * 2;
        const dy = (Math.random() - .5) * shakeAmt * 2;
        cv2.style.transform = `translate(${dx}px,${dy}px)`;
        shakeAmt *= .72;
      } catch(e) {}
    }

    // Lives system
    let lives = 3;
    function updateLivesHUD() {
      const el = document.getElementById('HLIVES'); if (!el) return; el.innerHTML = '';
      for (let i = 0; i < 3; i++) { const s = document.createElement('span'); s.className = 'hrt' + (i >= lives ? ' lost' : ''); s.textContent = '❤'; el.appendChild(s); }
    }
    function takeLoss() {
      lives--; updateLivesHUD();
      if (lives <= 0) { gameOver(); return; }
      snd('hit'); shake(14);
      spawnExp(player.x, player.y, '#ff6600', 28, false);
      player.hp = player.mhp; player.inv = 3;
      FT(player.x, player.y - 50, lives + ' LIFE LEFT!', '#ff8800');
      updateHealthBar(); comboCount = 0; document.getElementById('COMBO_HUD').classList.remove('show');
    }

    // ═══════════════ GAME LOOP ═══════════════
    let player, bullets, enemies, ebullets, coins, parts, pups;
    let score, wave, wTimer, eTimer, bossOn = false;
    let running = false, paused = false, lt = 0;
    let aps = {}, ptimers = {};

    function loop(ts) {
      if (!running || paused) { lt = ts; requestAnimationFrame(loop); return; }
      const dt = Math.min((ts - lt) / 1000, .05); lt = ts;
      drawBG(dt); cx.clearRect(0, 0, W, H);
      eTimer -= dt;
      if (eTimer <= 0 && !bossOn) { const r = Math.max(.55, 2.4 - wave * .07); eTimer = r * (.65 + Math.random() * .7); const rr = Math.random(); if (rr < .09 + wave * .025) spawnEnemy('tank'); else if (rr < .22) spawnEnemy('kamikaze'); else if (rr < .46) spawnEnemy('fast'); else spawnEnemy('basic'); }
      wTimer -= dt; if (wTimer <= 0 && !bossOn) startWave();
      if (!player) { requestAnimationFrame(loop); return; }
      player.fc -= dt; const fr = aps.rapid ? (player.fr * .28) : player.fr;
      if (player.fc <= 0) { shoot(); player.fc = fr; }
      player.inv = Math.max(0, player.inv - dt);
      if (typeof updateCombo === 'function') updateCombo(dt);
      if (typeof applyShake === 'function') applyShake();
      movePlayer(dt); updateEnemies(dt); collide();
      drawParts(dt); drawBullets(dt); drawEBullets(dt); drawEnemies(); drawCoins(dt); drawPups(dt); drawPlayer(dt);
      enemies = enemies.filter(e => !e.dead && e.y < H + 130);
      score += dt * 2.5; updateHUD(); updateHealthBar();
      requestAnimationFrame(loop);
    }

    // ═══════════════ INIT / OVER ═══════════════
    function initGame() {
      player = mkPlayer(); bullets = []; enemies = []; ebullets = []; coins = []; parts = []; pups = [];
      aps = {}; ptimers = {}; score = 0; wave = 0; bossOn = false; eTimer = 1.2; wTimer = 4;
      if (typeof lives !== 'undefined') lives = 3;
      if (typeof comboCount !== 'undefined') comboCount = 0;
      if (typeof comboTimer !== 'undefined') comboTimer = 0;
      shakeAmt = 0;
      document.getElementById('PUD').innerHTML = '';
      const ch = document.getElementById('COMBO_HUD'); if (ch) ch.classList.remove('show');
      if (typeof updateLivesHUD === 'function') updateLivesHUD();
      updateHUD(); updateHealthBar(); running = true; paused = false; lt = performance.now();
      startWave(); startMusic();
    }
    function gameOver() {
      running = false; stopMusic(); cgStop();
      const fs = Math.floor(score), isNew = fs > GS.best; if (isNew) GS.best = fs;
      document.getElementById('GO_SC').textContent = fs.toLocaleString();
      document.getElementById('GO_WV').textContent = wave;
      document.getElementById('GO_CN').textContent = GS.coins;
      if (document.getElementById('GO_BEST')) document.getElementById('GO_BEST').textContent = GS.best.toLocaleString();
      document.getElementById('GO_NEWBEST').style.display = isNew ? 'block' : 'none';
      spawnExp(player.x, player.y, '#ff6600', 60, true); snd('xb');
      setTimeout(() => document.getElementById('SCR_OVER').classList.remove('hidden'), 750);
    }
    function doPause() { paused = true; stopMusic(); cgStop(); document.getElementById('SCR_PAUSE').classList.remove('hidden'); }
    function unPause() { document.getElementById('SCR_PAUSE').classList.add('hidden'); paused = false; lt = performance.now(); startMusic(); cgStart(); }

    // ═══════════════ SHOP ═══════════════
    let shopFrom = 'title';
    function openShop(from) {
      shopFrom = from || 'title';
      if (running && from !== 'title' && from !== 'over') doPause();
      document.getElementById('SHOP_COINS').textContent = GS.coins;
      document.getElementById('SCR_SHOP').classList.remove('hidden');
      switchTab('ships'); renderShipGrid(); renderUpgrades(); renderWeapons();
    }
    function closeShop() {
      document.getElementById('SCR_SHOP').classList.add('hidden');
      if (shopFrom === 'title' || !running) document.getElementById('SCR_TITLE').classList.remove('hidden');
      else if (shopFrom === 'over') document.getElementById('SCR_OVER').classList.remove('hidden');
      else unPause();
    }
    function switchTab(tab) {
      document.querySelectorAll('.STAB').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.STAB_CONTENT').forEach(t => t.classList.remove('active'));
      document.getElementById('TAB_' + tab.toUpperCase()).classList.add('active');
      document.getElementById('TCONT_' + tab).classList.add('active');
    }

    function renderShipGrid() {
      const grid = document.getElementById('SHIP_GRID'); grid.innerHTML = '';
      document.getElementById('SHOP_COINS').textContent = GS.coins;
      Object.values(SHIPS).forEach(ship => {
        const owned = GS.ownedShips.includes(ship.id), active = GS.activeShip === ship.id;
        const canBuy = !owned && GS.coins >= ship.cost;
        const card = document.createElement('div');
        card.className = `SHIP_CARD${owned ? ' owned' : ''}${active ? ' active_ship' : ''}${!owned && !canBuy ? ' locked_card' : ''}`;
        card.style.setProperty('--scol', ship.color);
        if (active) card.innerHTML += `<div class="ACTIVE_BADGE">ACTIVE</div>`;
        if (owned && !active) card.innerHTML += `<div class="OWNED_BADGE">OWNED</div>`;
        // SVG ship image
        const imgWrap = document.createElement('div'); imgWrap.className = 'SHIP_IMG_WRAP'; imgWrap.style.setProperty('--scol', ship.color); imgWrap.innerHTML = SHIP_SVGS[ship.id] || '';
        card.appendChild(imgWrap);
        const statBars = `
      <div class="SHIP_NAME">${ship.name}</div>
      <div class="SHIP_CLASS">${ship.class} CLASS</div>
      <div class="SHIP_STATS">
        <div class="SSTAT"><span class="SSTAT_LABEL">HP</span><div class="SSTAT_BAR"><div class="SSTAT_FILL" style="width:${ship.stats.hp * 10}%;background:linear-gradient(90deg,#00ff88,#00ffcc);"></div></div></div>
        <div class="SSTAT"><span class="SSTAT_LABEL">DMG</span><div class="SSTAT_BAR"><div class="SSTAT_FILL" style="width:${ship.stats.dmg * 10}%;background:linear-gradient(90deg,#ff8800,#ffcc00);"></div></div></div>
        <div class="SSTAT"><span class="SSTAT_LABEL">SPD</span><div class="SSTAT_BAR"><div class="SSTAT_FILL" style="width:${ship.stats.spd * 10}%;background:linear-gradient(90deg,#00aaff,#00f5ff);"></div></div></div>
        <div class="SSTAT"><span class="SSTAT_LABEL">FIRE</span><div class="SSTAT_BAR"><div class="SSTAT_FILL" style="width:${ship.stats.fr * 10}%;background:linear-gradient(90deg,#ff0080,#ff66aa);"></div></div></div>
      </div>`;
        const btnHtml = active ? `<button class="SHIP_BTN equipped">✓ EQUIPPED</button>` :
          owned ? `<button class="SHIP_BTN equip" onclick="equipShip('${ship.id}')">EQUIP</button>` :
            canBuy ? `<button class="SHIP_BTN buy" onclick="buyShip('${ship.id}')">⬡ ${ship.cost}</button>` :
              `<button class="SHIP_BTN locked">⬡ ${ship.cost}</button>`;
        card.innerHTML += statBars + btnHtml;
        grid.appendChild(card);
      });
    }
    function buyShip(id) { const ship = SHIPS[id]; if (GS.coins < ship.cost) return; GS.coins -= ship.cost; GS.ownedShips.push(id); GS.activeShip = id; renderShipGrid(); renderUpgrades(); document.getElementById('SHOP_COINS').textContent = GS.coins; animateTitleShip(); }
    function equipShip(id) { GS.activeShip = id; renderShipGrid(); renderUpgrades(); animateTitleShip(); }

    function renderUpgrades() {
      const container = document.getElementById('UPG_CONTAINER'); container.innerHTML = '';
      const ship = SHIPS[GS.activeShip];
      const hdr = document.createElement('div'); hdr.innerHTML = `<div class="UPG_TITLE">Upgrading: ${ship.name} (${ship.class})</div>`; container.appendChild(hdr);
      const grid = document.createElement('div'); grid.className = 'UPG_GRID';
      UPGRADES.forEach(upg => {
        const upgs = GS.shipUpgrades[GS.activeShip]; const lvl = upgs[upg.key], maxed = lvl >= upg.max, cost = maxed ? 0 : upg.costPer[lvl]; const can = !maxed && GS.coins >= cost;
        const card = document.createElement('div'); card.className = `UPG_CARD${maxed ? ' maxed_c' : ''}${!can && !maxed ? ' cant_c' : ''}`;
        let dots = ''; for (let i = 0; i < upg.max; i++)dots += `<div class="UDOT${i < lvl ? ' on' : ''}"></div>`;
        card.innerHTML = `<span class="UPG_ICON">${upg.icon}</span><div class="UPG_NAME">${upg.name}</div><div class="UPG_DESC">${upg.desc}</div><div class="UPG_LVLDOTS">${dots}</div><div class="UPG_COST${maxed ? ' maxed_c' : ''}">${maxed ? 'MAX LEVEL' : `⬡ ${cost}`}</div>`;
        if (!maxed && can) card.onclick = () => { GS.coins -= cost; GS.shipUpgrades[GS.activeShip][upg.key]++; document.getElementById('SHOP_COINS').textContent = GS.coins; if (running && player && GS.activeShip === player.shipId) { if (upg.key === 'hp') { player.mhp += Math.floor(SHIPS[GS.activeShip].baseHP * .22); player.hp = Math.min(player.hp + Math.floor(SHIPS[GS.activeShip].baseHP * .22), player.mhp); } if (upg.key === 'spd') player.spd += SHIPS[GS.activeShip].baseSPD * .12; if (upg.key === 'fr') player.fr = Math.max(.06, player.fr * .94); if (upg.key === 'dmg') player.dmg += Math.floor(SHIPS[GS.activeShip].baseDMG * .18); updateHealthBar(); } renderUpgrades(); renderShipGrid(); };
        grid.appendChild(card);
      });
      container.appendChild(grid);
    }

    function renderWeapons() {
      const wg = document.getElementById('WEP_GRID'); wg.innerHTML = '';
      Object.entries(WEAPONS).forEach(([k, cfg]) => {
        const owned = GS.ownedWeapons.includes(k), active = GS.weapon === k, can = !owned && GS.coins >= cfg.cost;
        const card = document.createElement('div'); card.className = `WEP_CARD${owned ? ' owned_w' : ''}${active ? ' active_w' : ''}${!owned && !can ? ' cant_c' : ''}`;
        card.innerHTML = `<div class="WEP_NAME" style="color:${cfg.col}">${cfg.name}</div><div class="WEP_ICON_WRAP">${WEP_SVGS[k] || ''}</div><div class="WEP_DESC">${cfg.desc}</div><div class="WEP_COST" style="color:${owned ? '#00ff88' : '#ffee00'}">${owned ? (active ? '✓ ACTIVE' : 'EQUIP') : `⬡ ${cfg.cost}`}</div>`;
        if (owned) card.onclick = () => { GS.weapon = k; if (player) player.fc = 0; renderWeapons(); };
        else if (can) card.onclick = () => { GS.coins -= cfg.cost; GS.ownedWeapons.push(k); GS.weapon = k; document.getElementById('SHOP_COINS').textContent = GS.coins; renderWeapons(); };
        wg.appendChild(card);
      });
    }

    // Title ship animation
    let titleAnimFrame = null;
    function animateTitleShip() {
      const c = document.getElementById('TITLE_SHIP_CANVAS'), ctx2 = c.getContext('2d');
      if (titleAnimFrame) cancelAnimationFrame(titleAnimFrame);
      let t = 0;
      function frame() {
        try {
          ctx2.clearRect(0, 0, c.width, c.height);
          t += .04;
          const col = SHIPS[GS.activeShip].color;
          const r = parseInt(col.slice(1,3),16), g = parseInt(col.slice(3,5),16), b = parseInt(col.slice(5,7),16);
          const grd = ctx2.createRadialGradient(60, 70, 0, 60, 70, 50);
          grd.addColorStop(0, `rgba(${r},${g},${b},.2)`);
          grd.addColorStop(1, 'transparent');
          ctx2.fillStyle = grd;
          ctx2.fillRect(0, 0, c.width, c.height);
          drawShipOnCtx(ctx2, GS.activeShip, 60, 75, 1.75, t);
        } catch(e) {}
        titleAnimFrame = requestAnimationFrame(frame);
      }
      frame();
    }

    // ═══════════════ BUTTONS ═══════════════
    document.getElementById('BTN_START').onclick = () => {
      document.getElementById('SCR_TITLE').classList.add('hidden');
      cgStart(); initGame(); requestAnimationFrame(loop);
    };
    document.getElementById('BTN_TITLESHOP').onclick = () => { document.getElementById('SCR_TITLE').classList.add('hidden'); openShop('title'); };
    document.getElementById('SHOP_BACK').onclick = () => closeShop();
    document.getElementById('PAUSEBTN').onclick = () => { if (running) paused ? unPause() : doPause(); };
    document.getElementById('BTN_RESUME').onclick = () => unPause();
    document.getElementById('BTN_PAUSESHOP').onclick = () => { document.getElementById('SCR_PAUSE').classList.add('hidden'); openShop('pause'); };
    document.getElementById('BTN_RETRY').onclick = () => {
      document.getElementById('SCR_OVER').classList.add('hidden');
      cgStart(); initGame();
    };
    document.getElementById('BTN_OVERSHOP').onclick = () => { document.getElementById('SCR_OVER').classList.add('hidden'); openShop('over'); };
    document.getElementById('SNDBTN').onclick = () => { sndOn = !sndOn; document.getElementById('SNDBTN').textContent = sndOn ? '🔊' : '🔇'; if (!sndOn) stopMusic(); else if (running && !paused) startMusic(); };

    // ═══════════════ BOOT ═══════════════
    document.getElementById('FSBTN').onclick = () => {
      const el = document.getElementById('GW');
      if (!document.fullscreenElement) { el.requestFullscreen && el.requestFullscreen(); }
      else { document.exitFullscreen && document.exitFullscreen(); }
    };
    initStars(); drawBG(0); animateTitleShip(); requestAnimationFrame(loop);
  </script>
</body>
